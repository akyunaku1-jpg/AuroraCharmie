<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Charmie | Admin Login</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body data-admin-page="login">
    <main class="admin-shell admin-login-shell">
      <section class="admin-card admin-login-card">
        <h1>Admin Login</h1>
        <p>Sign in with your admin account to manage products.</p>

        <form id="adminLoginForm" class="admin-form">
          <label for="adminEmail">Email</label>
          <input id="adminEmail" name="email" type="email" autocomplete="email" required />

          <label for="adminPassword">Password</label>
          <input
            id="adminPassword"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />

          <button id="adminLoginBtn" type="submit">Login</button>
          <p id="adminLoginError" class="form-message form-error" role="alert" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
  </body>
</html>
