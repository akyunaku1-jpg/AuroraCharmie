<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Charmie | Admin Login</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="/admin.css" />
  </head>
  <body class="auth-page">
    <span class="deco top-left">🍒</span>
    <span class="deco top-right">✨</span>
    <span class="deco bottom-left">🌸</span>
    <span class="deco bottom-right">🌙</span>

    <main class="auth-layout">
      <header class="auth-brand">
        <h1>🌸 Aurora Charmie 🍒</h1>
        <p>Admin</p>
      </header>

      <section class="auth-card">
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input id="emailInput" type="email" placeholder="Email" autocomplete="email" />
        </div>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input id="passwordInput" type="password" placeholder="Password" autocomplete="current-password" />
        </div>
        <button id="loginBtn" class="btn" type="button">✨🍒 Login</button>
        <div id="errorBox" class="error-box"></div>
      </section>

      <p class="auth-footer">✨ <a href="/admin-register">Tambah akun baru</a> 🌙</p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="/supabase.js"></script>
    <script src="/admin.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        initLoginPage();
      });
    </script>
  </body>
</html>
