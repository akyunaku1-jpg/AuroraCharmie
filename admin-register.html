<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Charmie | Admin Register</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="/admin.css" />
  </head>
  <body class="auth-page">
    <span class="deco top-left">🍒</span>
    <span class="deco top-right">✨</span>
    <span class="deco bottom-left">🌸</span>
    <span class="deco bottom-right">🌙</span>

    <main class="auth-layout">
      <header class="auth-brand">
        <h1>🌸 Aurora Charmie 🍒</h1>
        <p>Admin</p>
      </header>

      <section class="auth-card">
        <h2>Buat Akun Admin</h2>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input id="regEmailInput" type="email" placeholder="Email" autocomplete="email" />
        </div>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input id="regPasswordInput" type="password" placeholder="Password" autocomplete="new-password" />
        </div>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input
            id="regConfirmPasswordInput"
            type="password"
            placeholder="Konfirmasi Password"
            autocomplete="new-password"
          />
        </div>
        <button id="registerBtn" class="btn" type="button">Daftar</button>
        <div id="errorBox" class="error-box"></div>
        <div id="successBox" class="success-box"></div>
      </section>

      <p class="auth-footer">✨ <a href="/admin-login">Sudah punya akun? Login</a> 🌙</p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="/supabase.js"></script>
    <script src="/admin.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        initRegisterPage();
      });
    </script>
  </body>
</html>
